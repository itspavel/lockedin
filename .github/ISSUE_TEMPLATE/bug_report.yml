name: Bug report
description: Something's broken or behaving oddly
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: What did you see, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the popover
        2. ...
  - type: input
    id: version
    attributes:
      label: LockedIn version
      placeholder: "0.1 (Settings → Software update shows it)"
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version + Mac model
      placeholder: "macOS 15.2, MacBook Pro M3 (notched)"
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Which tools were running (Cursor / Claude Code / agents), rough size of ~/.claude/projects, screenshots.
