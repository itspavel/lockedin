name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  app:
    name: Build macOS app
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Swift version
        run: swift --version
      - name: Build (debug)
        run: swift build
      - name: Assemble .app bundle
        run: ./scripts/bundle.sh

  # The landing site lives in its own repo (itspavel/lockedin-site) with its own CI.
