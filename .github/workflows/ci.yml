name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  app:
    name: Build macOS app
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Swift version
        run: swift --version
      - name: Build (debug)
        run: swift build
      - name: Assemble .app bundle
        run: ./scripts/bundle.sh

  landing:
    name: Build landing site
    runs-on: ubuntu-latest
    defaults:
      run: { working-directory: landing }
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm, cache-dependency-path: landing/pnpm-lock.yaml }
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
